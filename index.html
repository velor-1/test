<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPAGO | Crepes & Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0e0b06;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Raleway', sans-serif;
    overflow: hidden;
    position: relative;
  }

  #canvas-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 10;
    width: 360px;
    background: rgba(26, 18, 8, 0.88);
    border: 1px solid rgba(196, 154, 44, 0.25);
    border-radius: 20px;
    padding: 44px 32px 36px;
    text-align: center;
    backdrop-filter: blur(18px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(196,154,44,0.08);
    animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes cardIn {
    from { opacity:0; transform: translateY(30px) scale(.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

.avatar {
  width: 72px;
  height: 72px;
  margin: 0 auto 14px;
  border-radius: 50%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.avatar img {
  width: 80%;
  height: 80%;
  object-fit: contain;
}

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: #f5f0e8;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .tagline {
    margin-top: 6px;
    font-size: 12px;
    font-weight: 300;
    color: #c49a2c;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c49a2c, transparent);
    margin: 20px auto;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-radius: 12px;
    background: rgba(196,154,44,0.08);
    border: 1px solid rgba(196,154,44,0.2);
    color: #ffffff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all .25s ease;
    cursor: pointer;
  }

  .btn:hover {
    background: rgba(196,154,44,0.18);
    border-color: #c49a2c;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(196,154,44,0.15);
  }

  .btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .btn-label { flex: 1; text-align: left; }
  .btn-arrow { opacity: .4; font-size: 18px; }

  .footer {
    margin-top: 28px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(245,240,232,0.2);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="card">

  <div class="name">SPAGO</div>

  <div class="divider"></div>

  <div class="links">

    <!-- Instagram -->

   target="_blank"

        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="#ffffff" stroke="none"/>
      </svg>
      <span class="btn-label">Instagram</span>
      <span class="btn-arrow">›</span>
    </a>

    <!-- Threads -->
    <a href="https://www.threads.com/@spago_gloucester?igshid=NTc4MTIwNjQ2YQ=="
   class="btn"
   target="_blank"
   rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.5 12.5c-.2-3-2.3-5-5.5-5-3.5 0-5.8 2.3-5.8 6s2.3 6 5.8 6c2.8 0 4.8-1.5 5.4-4" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M9 11.5c.5-1.5 1.8-2.5 3-2.5" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="14.5" cy="12" r="2" stroke="#ffffff" stroke-width="1.8"/>
      </svg>
      <span class="btn-label">Threads</span>
      <span class="btn-arrow">›</span>
    </a>

    <!-- Facebook -->
   <a href="https://www.facebook.com/share/17zW7b3Riq/?mibextid=wwXIfr"
   class="btn"
   target="_blank"
   rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.8">
        <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
      </svg>
      <span class="btn-label">Facebook</span>
      <span class="btn-arrow">›</span>
    </a>

    <!-- Google Maps -->
    <!-- Google Maps -->
<a href="https://maps.app.goo.gl/MPSQeUPG9TFyMjB56?g_st=ic"

  </div>

  <div class="footer">Spago · Est. 2019</div>
</div>

<script>
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function buildStamp(size) {
  const oc = document.createElement('canvas');
  oc.width = oc.height = size;
  const c = oc.getContext('2d');
  const cx = size/2, cy = size/2, r = size*0.44;

  c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2);
  c.strokeStyle='#c49a2c'; c.lineWidth=size*0.028; c.stroke();

  c.beginPath(); c.arc(cx,cy,r*0.86,0,Math.PI*2);
  c.strokeStyle='#c49a2c'; c.lineWidth=size*0.01; c.stroke();

  const topR = r*0.76;
  c.font = `bold ${size*0.1}px Georgia,serif`;
  c.fillStyle = '#c49a2c';
  c.textAlign = 'center';

  const topText = 'CREPES';
  for(let i=0;i<topText.length;i++){
    const angle = -Math.PI/2 - (topText.length-1)/2*0.18 + i*0.18;
    c.save();
    c.translate(cx + topR*Math.cos(angle), cy + topR*Math.sin(angle));
    c.rotate(angle + Math.PI/2);
    c.fillText(topText[i],0,0);
    c.restore();
  }

  const botText = 'COFFEE';
  for(let i=0;i<botText.length;i++){
    const angle = Math.PI/2 - (botText.length-1)/2*0.18 + i*0.18;
    c.save();
    c.translate(cx + topR*Math.cos(angle), cy + topR*Math.sin(angle));
    c.rotate(angle - Math.PI/2);
    c.fillText(botText[i],0,0);
    c.restore();
  }

  c.font = `${size*0.07}px Georgia,serif`;
  c.fillStyle='#c49a2c'; c.textAlign='center';
  c.fillText('— 2019 —', cx, cy - size*0.07);

  c.font = `900 ${size*0.19}px Georgia,serif`;
  c.fillStyle='#f5f0e8';
  c.fillText('SPAGO', cx, cy + size*0.07);

  c.font = `${size*0.065}px Georgia,serif`;
  c.fillStyle='#c49a2c';
  c.fillText('Bakers Quay', cx, cy + size*0.18);

  c.font = `${size*0.06}px serif`;
  c.fillStyle='#c49a2c';
  c.fillText('★ ★ ★', cx, cy + size*0.28);

  return oc;
}

const SIZES = [38, 52, 68];
const stamps = SIZES.map(s => buildStamp(s));

class Flake {
  constructor() { this.reset(true); }
  reset(init=false) {
    this.size  = SIZES[Math.floor(Math.random()*SIZES.length)];
    this.img   = stamps[SIZES.indexOf(this.size)];
    this.x     = Math.random()*canvas.width;
    this.y     = init ? Math.random()*canvas.height : -this.size-20;
    this.vy    = 0.4 + Math.random()*0.7;
    this.vx    = (Math.random()-0.5)*0.3;
    this.angle = Math.random()*Math.PI*2;
    this.va    = (Math.random()-0.5)*0.008;
    this.alpha = 0.06 + Math.random()*0.12;
  }
  update() {
    this.y += this.vy; this.x += this.vx; this.angle += this.va;
    if(this.y > canvas.height + this.size) this.reset();
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x + this.size/2, this.y + this.size/2);
    ctx.rotate(this.angle);
    ctx.drawImage(this.img, -this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
  }
}

const flakes = Array.from({length: 40}, () => new Flake());

function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  flakes.forEach(f => { f.update(); f.draw(); });
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
